<ui:composition template="layout.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:define name="contenido">

		<h2 style="text-align: center;">Inicio de Sesión</h2>

		<h:panelGroup layout="block"
			style="width:300px; margin:0 auto; padding:20px; border:1px solid #ccc; border-radius:8px; background-color:#f8f8f8;">

			<h:form>
				<h:commandButton value="Ver historial"
					action="historial.xhtml?faces-redirect=true" />
			</h:form>

			<h:form>

				<!-- Mensajes JSF -->
				<!-- <h:messages  showSummary="true" showDetail="false"
					style="color:red; text-align:center;" /> -->

				<h:panelGrid columns="2" cellpadding="5" style="margin-top:10px;">

					<h:outputLabel for="cuenta" value="Número de Cuenta:" />
					<h:inputText id="cuenta" value="#{atmBean.numeroCuenta}"
						required="true" requiredMessage="Ingrese usuario" />
					<br />
					<h:message for="cuenta" showSummary="true" showDetail="false"
						style="color:red" />

					<h:outputLabel for="pin" value="PIN:" />
					<h:inputSecret id="pin" value="#{atmBean.pin}" required="true"
						requiredMessage="Ingrese PIN" />
					<br />
					<h:message for="pin" showSummary="true" showDetail="false"
						style="color:red" />

				</h:panelGrid>

				<br />

				<h:commandButton value="Iniciar Sesión" action="#{atmBean.login}"
					style="width:100%; padding:10px; font-weight:bold;" />
				<h:messages globalOnly="true" style="color:red; text-align:center;"/>

			</h:form>

		</h:panelGroup>

	</ui:define>

</ui:composition>
