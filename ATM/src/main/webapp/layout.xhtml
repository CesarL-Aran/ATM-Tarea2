<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
	<title>Cajero ATM</title>

	<style>
.header {
	background-color: #1f4e79;
	color: white;
	padding: 15px;
	font-weight: bold;
}

.contenido {
	padding: 20px;
}
</style>
</h:head>

<h:body>

	<!-- Barra superior -->
	<div class="header">
		<h:outputText value="Cuenta: #{atmBean.numeroCuenta}" />
	</div>

	<!-- Zona dinámica -->
	<div class="contenido">
		<ui:insert name="contenido" />
	</div>

</h:body>
</html>
