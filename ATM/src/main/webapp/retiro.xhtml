<!DOCTYPE html>
<ui:composition template="layout.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

	<ui:define name="contenido">

		<h2>Retiro de Dinero</h2>

		<h:form>

			<!-- Mensajes JSF -->
			<h:messages globalOnly="true" showDetail="true" style="color:red;" />

			<br />

			<h:panelGrid columns="2" cellpadding="5">

				<h:outputLabel for="pin" value="Ingrese su PIN:" />
				<h:inputSecret id="pin" value="#{atmBean.pinConfirmacion}"
					required="true" requiredMessage="Debe ingresar el PIN" />

				<h:outputLabel for="monto" value="Monto a retirar:" />

				<h:inputText id="monto" value="#{atmBean.monto}" required="true"
					requiredMessage="Ingrese el monto">
					<f:validateDoubleRange minimum="0.01" />
				</h:inputText>
			</h:panelGrid>

			<br />
			<br />

			<h:commandButton value="Retirar" action="#{atmBean.retirar}" />

			<br />
			<br />

			<h:commandButton value="Volver al menú"
				action="menu.xhtml?faces-redirect=true" immediate="true" />

		</h:form>

	</ui:define>

</ui:composition>
